name: CI

on:
  push:
  # pull_request:

permissions:
  contents: read

jobs:
  ts-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

  prettier-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npm run format:check

  test:
    runs-on: ubuntu-latest
    permissions:
      # Required by EnricoMi/publish-unit-test-result-action@v2 to upload test results
      checks: write
      pull-requests: write
      # Other permissions required in private repos
      # contents: read
      # issues: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --reporter=junit --outputFile=test-results.xml

      - name: Upload test results
        if: (!cancelled())
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results.xml

      - name: Show test results
        if: (!cancelled())
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results.xml
